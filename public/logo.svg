<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="200" height="200" rx="44" fill="url(#shine)"/>

  <!-- Cloud shape (white) -->
  <path d="M148 115c0 9.9-8.1 18-18 18H72c-11.04 0-20-8.96-20-20 0-9.6 6.8-17.6 16-19.4V93c0-13.25 10.75-24 24-24 9.8 0 18.2 5.9 22.1 14.4C116.3 82.5 119 81 122 81c7.73 0 14 6.27 14 14 0 .67-.05 1.33-.14 1.97C141.46 99.27 148 106.5 148 115z" fill="white" opacity="0.96"/>

  <!-- Bot face inside cloud -->
  <!-- Eyes -->
  <circle cx="88" cy="112" r="5" fill="#4f46e5"/>
  <circle cx="112" cy="112" r="5" fill="#4f46e5"/>
  <!-- Pupils shine -->
  <circle cx="90" cy="110.5" r="1.8" fill="white"/>
  <circle cx="114" cy="110.5" r="1.8" fill="white"/>
  <!-- Smile -->
  <path d="M90 121 Q100 128 110 121" stroke="#4f46e5" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Antenna -->
  <line x1="100" y1="93" x2="100" y2="82" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="79" r="4" fill="#4f46e5"/>

  <!-- Sparkle top-right (AI indicator) -->
  <g transform="translate(142, 52)">
    <path d="M0 -7 L1.5 -1.5 L7 0 L1.5 1.5 L0 7 L-1.5 1.5 L-7 0 L-1.5 -1.5 Z" fill="rgba(255,255,255,0.85)"/>
  </g>
  <!-- Small sparkle bottom-right -->
  <g transform="translate(155, 72)">
    <path d="M0 -4 L0.8 -0.8 L4 0 L0.8 0.8 L0 4 L-0.8 0.8 L-4 0 L-0.8 -0.8 Z" fill="rgba(255,255,255,0.5)"/>
  </g>
</svg>
